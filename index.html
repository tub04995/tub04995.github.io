<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Web Audio Metronome</title>
    <link rel="stylesheet" href="static/css/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Metronome App</h1>
      <button id="helpBtn" class="help-btn">ℹ</button>
      <div id="helpModal" class="help-modal hidden">
        <div class="help-box">
          <button id="closeHelp" class="close-help">×</button>
          <h2>How to use</h2>
          <p>Tap anywhere outside the circle to set the tempo.</p>
          <p>Use the slider to adjust BPM manually.</p>
          <p>
            Choose a sound style and beats per measure for different practice
            needs.
          </p>
          <p>Use the speaker icon to mute or adjust volume.</p>
        </div>
      </div>

      <section class="grid">
        <div class="control">
          <label for="tempo"
            >Tempo <span class="value" id="tempoValue">120 </span>
            <span class="unit">BPM</span></label
          >
          <input id="tempo" type="range" min="10" max="300" value="120" />
        </div>
      </section>

      <div class="control volume-control">
        <span id="muteIcon" class="speaker-icon">&#128266;</span>
        <label for="volume">
          <span class="value" id="volumeValue">80%</span>
        </label>
        <input id="volume" type="range" min="0" max="100" value="80" />
      </div>

      <div class="control">
        <label for="soundStyle">Sound Style</label>
        <select id="soundStyle">
          <option value="classic">Classic Click</option>
          <option value="beep" selected>Electronic Beep</option>
          <option value="soft">Soft Tick</option>
          <option value="wood">Wood Block</option>
        </select>
      </div>
      <div class="control">
        <label for="beatsPerMeasure">Beats per measure</label>
        <select id="beatsPerMeasure">
          <option value="0" selected>No meter</option>
          <option value="2">2/4</option>
          <option value="3">3/4</option>
          <option value="4">4/4</option>
          <option value="5">5/4</option>
          <option value="6">6/8</option>
          <option value="7">7/8</option>
        </select>
      </div>
      <section class="buttons">
        <div class="pendulum-area">
          <div class="wire">
            <div class="bob" id="bob"></div>
          </div>
        </div>
        <button id="toggleBtn">Start</button>
      </section>

      <section id="pulse" class="pulse"></section>
      <div class="status" id="status">Stopped</div>
    </main>

    <script src="static/js/app.js"></script>
  </body>
</html>
